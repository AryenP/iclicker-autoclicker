<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 14px;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 0 2px;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: #1d1d1f;
    }
    #dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c7c7cc;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #dot.rec {
      background: #ff3b30;
      box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.2);
      animation: pulse 1.4s ease-in-out infinite;
    }
    #dot.play {
      background: #30d158;
      box-shadow: 0 0 0 3px rgba(48, 209, 88, 0.2);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* ── Cards ───────────────────────────────────── */
    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 1px 0 rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.06);
      overflow: hidden;
      margin-bottom: 6px;
    }

    /* ── Section label ───────────────────────────── */
    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: #86868b;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0 4px;
      margin: 14px 0 6px;
    }

    /* ── Record button ───────────────────────────── */
    #btnRec {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      background: #007aff;
      color: #ffffff;
      transition: opacity 0.15s, transform 0.1s;
    }
    #btnRec:active { transform: scale(0.98); opacity: 0.88; }
    #btnRec.recording { background: #ff3b30; }

    /* ── Step list ───────────────────────────────── */
    #step-list:empty::before {
      content: 'No steps yet — hit Record and click spots on the page';
      display: block;
      padding: 22px 16px;
      text-align: center;
      color: #aeaeb2;
      font-size: 13px;
      line-height: 1.55;
    }

    .step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 0.5px solid rgba(0,0,0,.06);
    }
    .step-row:last-child { border-bottom: none; }
    .step-row.active .step-num { background: #ff9500; }

    .step-num {
      min-width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #007aff;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .step-info { flex: 1; overflow: hidden; }
    .step-label {
      font-size: 13px;
      font-weight: 500;
      color: #1d1d1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .step-coords {
      font-size: 11px;
      color: #aeaeb2;
      margin-top: 1px;
      font-variant-numeric: tabular-nums;
    }

    .step-arrows { display: flex; flex-direction: column; gap: 1px; }
    .step-arrows button {
      background: none;
      border: none;
      color: #c7c7cc;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1;
      font-family: inherit;
      transition: color 0.12s, background 0.12s;
    }
    .step-arrows button:hover:not(:disabled) { color: #007aff; background: #f0f5ff; }
    .step-arrows button:disabled { opacity: 0.25; cursor: default; }

    .btn-del {
      background: none;
      border: none;
      color: #c7c7cc;
      font-size: 15px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .btn-del:hover { background: #fff1f0; color: #ff3b30; }

    /* ── Clear all ───────────────────────────────── */
    #btnClear {
      background: none;
      border: none;
      color: #ff3b30;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 4px 0;
      display: block;
      width: 100%;
      text-align: right;
      opacity: 0.75;
      transition: opacity 0.15s;
    }
    #btnClear:hover { opacity: 1; }

    /* ── Settings ────────────────────────────────── */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 0.5px solid rgba(0,0,0,.06);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; color: #1d1d1f; }

    .delay-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #f5f5f7;
      border-radius: 8px;
      padding: 5px 9px;
    }
    input[type=number] {
      width: 40px;
      background: none;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      color: #1d1d1f;
      text-align: right;
      -moz-appearance: textfield;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .unit { font-size: 13px; color: #86868b; }

    /* Apple-style toggle */
    .switch { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #e5e5ea;
      border-radius: 26px;
      cursor: pointer;
      transition: background 0.22s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      left: 2px; top: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.22);
      transition: transform 0.22s;
    }
    input:checked + .slider { background: #34c759; }
    input:checked + .slider::before { transform: translateX(18px); }

    /* ── Play row ────────────────────────────────── */
    .play-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    #btnPlay {
      flex: 1;
      padding: 13px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    #btnPlay:active:not(:disabled) { transform: scale(0.97); }
    #btnPlay:disabled { opacity: 0.35; cursor: default; }

    #btnStop {
      flex: 1;
      padding: 13px;
      background: #fff;
      color: #ff3b30;
      border: 1.5px solid rgba(255,59,48,.35);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #btnStop:hover:not(:disabled) { background: #fff5f5; }
    #btnStop:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>

  <div class="header">
    <span id="dot"></span>
    <h1>AutoClicker</h1>
  </div>

  <button id="btnRec">⏺&nbsp;&nbsp;Start Recording</button>

  <div class="section-label">Click Sequence</div>
  <div class="card">
    <div id="step-list"></div>
  </div>
  <button id="btnClear">Clear All Steps</button>

  <div class="section-label">Settings</div>
  <div class="card">
    <div class="setting-row">
      <span class="setting-label">Delay between clicks</span>
      <div class="delay-wrap">
        <input type="number" id="delay" min="0.1" max="60" step="0.1" value="1.0"/>
        <span class="unit">sec</span>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Loop sequence</span>
      <label class="switch">
        <input type="checkbox" id="loop"/>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="play-row">
    <button id="btnPlay">▶&nbsp;&nbsp;Play</button>
    <button id="btnStop" disabled>■&nbsp;&nbsp;Stop</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
